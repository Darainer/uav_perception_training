# RF-DETR-Small fine-tuning config
# Target hardware: RTX 3060 12GB (training), Orin Nano 8GB (inference)

model:
  variant: rfdetr_base          # rfdetr_base = RF-DETR-Small in rfdetr package
  pretrained: true              # Start from COCO pretrained weights
  num_classes: 3                # person, vehicle, animal

training:
  epochs: 100
  batch_size: 8                 # Safe for 3060 12GB at 512x512 FP16
  grad_accum_steps: 2           # Effective batch = 16
  learning_rate: 1.0e-4
  lr_backbone: 1.0e-5           # Lower LR for frozen DINOv2 backbone
  weight_decay: 1.0e-4
  warmup_epochs: 5
  mixed_precision: true         # FP16 training
  grad_clip: 0.1

  # LR schedule
  lr_scheduler: cosine
  lr_min: 1.0e-6

  # Checkpointing
  save_every: 10                # Save checkpoint every N epochs
  checkpoint_dir: models/checkpoints

  # Early stopping
  patience: 20                  # Stop if no mAP improvement for N epochs

data:
  train_json: data/splits/train.json
  val_json: data/splits/val.json
  test_json: data/splits/test.json
  image_size: 512
  num_workers: 4

  # Augmentation
  augmentation:
    horizontal_flip: true
    vertical_flip: false        # Aerial - vertical flip less useful
    random_crop: true
    color_jitter: true
    mosaic: false               # Enable after baseline established

logging:
  use_wandb: false              # Set true and add WANDB_API_KEY to use
  project: uav_perception_training
  tensorboard: true
  log_dir: logs/
